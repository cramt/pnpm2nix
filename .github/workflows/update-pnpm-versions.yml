name: update-pnpm-versions

on:
  schedule:
    # Daily at 06:00 UTC. pnpm releases are infrequent enough that this
    # is generous; tighten if you want fresher data.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-pnpm-versions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN; the contents:write permission
          # above is enough to push back to the same repo.
          persist-credentials: true

      - name: Run update script
        run: node scripts/update-pnpm-versions.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- pnpm-versions.json; then
            echo "no new pnpm versions"
            exit 0
          fi

          added="$(git diff --unified=0 -- pnpm-versions.json \
            | grep -E '^\+\s*"' | wc -l)"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-versions.json
          git commit -m "chore: refresh pnpm-versions.json (+${added} versions)"
          git push origin HEAD:main
